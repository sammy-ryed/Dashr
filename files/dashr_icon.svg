<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
  </defs>

  <!-- Offset shadow -->
  <circle cx="268" cy="268" r="248" fill="#000"/>

  <!-- Main yellow circle -->
  <circle cx="256" cy="256" r="248" fill="#F5C800"/>

  <!-- Black border ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#000" stroke-width="8"/>

  <!-- Halftone dots top-right -->
  <g clip-path="url(#circleClip)" opacity="0.08" fill="#000">
    <circle cx="330" cy="90" r="4"/><circle cx="358" cy="90" r="4"/><circle cx="386" cy="90" r="4"/><circle cx="414" cy="90" r="4"/>
    <circle cx="330" cy="116" r="4"/><circle cx="358" cy="116" r="4"/><circle cx="386" cy="116" r="4"/><circle cx="414" cy="116" r="4"/><circle cx="438" cy="116" r="4"/>
    <circle cx="358" cy="142" r="4"/><circle cx="386" cy="142" r="4"/><circle cx="414" cy="142" r="4"/><circle cx="438" cy="142" r="4"/>
    <circle cx="386" cy="168" r="4"/><circle cx="414" cy="168" r="4"/><circle cx="438" cy="168" r="4"/>
    <circle cx="414" cy="194" r="4"/><circle cx="438" cy="194" r="4"/>
    <circle cx="438" cy="220" r="4"/>
  </g>

  <!-- Speed lines bottom-left -->
  <g clip-path="url(#circleClip)" stroke="#000" stroke-width="5" opacity="0.10">
    <line x1="60" y1="390" x2="260" y2="190"/>
    <line x1="80" y1="415" x2="280" y2="215"/>
    <line x1="105" y1="435" x2="300" y2="240"/>
  </g>

  <!-- D mark — left bar -->
  <rect x="118" y="134" width="32" height="244" rx="0" fill="#000"/>

  <!-- D belly polygon -->
  <polygon points="150,134 242,134 318,196 318,256 318,316 242,378 150,378 150,344 228,344 286,304 286,256 286,208 228,168 150,168" fill="#000"/>

  <!-- D hollow cutout -->
  <polygon points="182,168 226,168 270,208 270,256 270,304 226,344 182,344 182,310 214,310 246,280 246,256 246,232 214,202 182,202" fill="#F5C800"/>

  <!-- SRM stamp bottom -->
  <rect x="210" y="408" width="92" height="22" rx="0" fill="#000"/>
  <text x="256" y="424" font-family="Arial Black, Impact, sans-serif" font-size="10" font-weight="900" fill="#F5C800" text-anchor="middle" letter-spacing="3">SRM IST</text>

  <!-- Registration mark bottom-right -->
  <g clip-path="url(#circleClip)">
    <circle cx="388" cy="388" r="18" fill="none" stroke="#000" stroke-width="4"/>
    <circle cx="388" cy="388" r="4" fill="#000"/>
    <line x1="388" y1="370" x2="388" y2="406" stroke="#000" stroke-width="2.5"/>
    <line x1="370" y1="388" x2="406" y2="388" stroke="#000" stroke-width="2.5"/>
  </g>

  <!-- Corner pip top-left -->
  <g clip-path="url(#circleClip)">
    <rect x="108" y="108" width="18" height="18" rx="0" fill="#000"/>
    <rect x="112" y="112" width="10" height="10" rx="0" fill="#F5C800"/>
  </g>
</svg>
